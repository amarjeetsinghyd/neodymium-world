name: Update News Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:         # manual trigger
  push:
    branches: [main]
    paths: ['content/articles/**']

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (shallow — only latest commit needed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # was 0 (full history) — shallow saves ~10s checkout time

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'     # pip cache keyed to requirements.txt hash

      - name: Install dependencies
        run: pip install -r requirements.txt
        # 5 lightweight packages: feedparser, jinja2, requests, PyYAML, beautifulsoup4
        # trafilatura, markdown, python-frontmatter removed — saves ~120MB & ~40% install time

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch new articles (update_news.py)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Compile HTML + generate news_data.json (recompile_html.py)
        run: python recompile_html.py
        # Incremental: only rebuilds articles whose .md is newer than their .html

      - name: Post new articles to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/post_to_discord.py
        continue-on-error: true  # Discord failure must not block the site deploy

      - name: Commit and push
        run: |
          # Untrack only true ephemeral files
          git rm --cached error.log 2>/dev/null || true
          git rm --cached run_log.txt 2>/dev/null || true
          git rm -r --cached __pycache__/ 2>/dev/null || true

          # Stage everything including:
          #   content/articles/*.md  — new articles
          #   content/seen_urls.json — dedup state (must be committed)
          #   articles/*.html        — compiled article pages
          #   news_data.json         — homepage feed data
          #   sitemap.xml, rss.xml, archive.html
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit — pipeline produced no new articles."
          else
            git commit -m "chore: auto-update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
