name: Update News Pipeline

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main          # Only fire on pushes to main - never on feature branches
    paths:
      - 'content/articles/**'

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run news update pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Recompile HTML + generate news_data.json
        run: python recompile_html.py

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/post_to_discord.py
        continue-on-error: true

      - name: Commit and push changes
        run: |
          # Untrack files that should stay gitignored
          git rm --cached error.log 2>/dev/null || true
          git rm --cached run_log.txt 2>/dev/null || true
          git rm -r --cached __pycache__/ 2>/dev/null || true

          # NOTE: news_data.json is intentionally tracked and committed.
          # It must be deployed to GitHub Pages so the homepage JS fetch()
          # can load the live feed, thumbnails, and featured brief.
          # DO NOT add git rm --cached news_data.json here.

          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update data feeds and SSG articles"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
