name: Update News Pipeline

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main          # Only fire on pushes to main — never on feature branches
    paths:
      - 'content/articles/**'

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run automated AI generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Recompile HTML and JSON
        run: python recompile_html.py

      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/post_to_discord.py

      - name: Commit and push changes
        run: |
          # Explicitly untrack any gitignored files that may have been
          # created during the run (news_data.json, *.log, __pycache__/, etc.)
          # before staging. This prevents them ever appearing in a commit.
          git rm --cached news_data.json error.log run_log.txt 2>/dev/null || true
          git rm --cached -r __pycache__ 2>/dev/null || true
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update data feeds and SSG articles"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
