<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence Archive | Neodymium</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f3f5f9;
      --text-main: #0f172a;
      --text-muted: #475569;
      --text-light: #94a3b8;
      --accent-blue: #2563eb;
      --accent-violet: #7c3aed;
      --gradient-primary: linear-gradient(135deg, #2563eb, #7c3aed);
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.4);
      --font-heading: 'IBM Plex Sans', sans-serif;
      --font-body: 'IBM Plex Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); color: var(--text-main); background-color: var(--bg-color); line-height: 1.6; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
    .navbar { padding: 1rem 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    .brand { font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; text-decoration: none; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; }
    .brand-icon { width: 32px; height: 32px; background: var(--gradient-primary); color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 500; }
    .header { padding: 8rem 0 4rem; text-align: center; }
    .header h1 { font-family: var(--font-heading); font-size: 3rem; margin-bottom: 1rem; }
    .text-gradient { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 4rem; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; transition: transform 0.3s; text-decoration: none; color: inherit; }
    .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .card-img { width: 100%; height: 180px; background-size: cover; background-position: center; border-radius: 8px; margin-bottom: 1rem; background-color: var(--gradient-primary); }
    .tag { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 100px; font-size: 0.8rem; font-weight: 600; background: rgba(37,99,235,0.1); color: var(--accent-blue); margin-bottom: 1rem; }
    .card-title { font-family: var(--font-heading); font-size: 1.25rem; margin-bottom: 1rem; line-height: 1.3; }
    .card-meta { margin-top: auto; display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-light); }
    
    /* Simple client side filtering */
    .filter-bar { display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.5rem 1.5rem; border-radius: 100px; border: 1px solid var(--accent-blue); background: transparent; color: var(--accent-blue); cursor: pointer; font-family: var(--font-body); font-weight: 600; transition: all 0.2s; }
    .filter-btn.active, .filter-btn:hover { background: var(--accent-blue); color: white; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" class="brand">
        <div class="brand-icon">N</div>
        Neodymium
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="#">Policy Watch</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <h1>Intelligence <span class="text-gradient">Archive</span></h1>
      <p style="color: var(--text-muted); font-size: 1.2rem;">Complete historical database of all strategic intelligence reports.</p>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterArchive('All')">All</button>
      <button class="filter-btn" onclick="filterArchive('Tech Startups')">Tech Startups</button>
      <button class="filter-btn" onclick="filterArchive('Global Tech')">Global Tech</button>
      <button class="filter-btn" onclick="filterArchive('Artificial Intelligence')">Artificial Intelligence</button>
      <button class="filter-btn" onclick="filterArchive('Defense Technology')">Defense</button>
    </div>

    <div class="archive-grid" id="archive-grid">
      {% for item in articles %}
      <a href="{{ item.article_url }}" class="glass-card" data-category="{{ item.category }}">
        <div class="card-img" style="{% if item.image_url %}background-image: url('{{ item.image_url }}');{% endif %}"></div>
        <span class="tag">{{ item.category }}</span>
        <h3 class="card-title">{{ item.title }}</h3>
        <div class="card-meta">
          <span>{{ item.published_at[:10] }}</span>
          <span style="color: var(--accent-blue); font-weight: 600;">Read &rarr;</span>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>

  <script>
    function filterArchive(category) {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText === category || (category === 'All' && btn.innerText === 'All')) {
          btn.classList.add('active');
        }
      });
      
      const cards = document.querySelectorAll('.glass-card');
      cards.forEach(card => {
        if (category === 'All') {
          card.style.display = 'flex';
        } else {
          // Loose matching
          const cardCat = card.getAttribute('data-category').toLowerCase();
          const target = category.toLowerCase();
          
          if (cardCat.includes(target) || (target === 'defense' && cardCat.includes('defen')) || (target === 'artificial intelligence' && cardCat.includes('ai'))) {
             card.style.display = 'flex';
          } else {
             card.style.display = 'none';
          }
        }
      });
    }

    // Auto-filter based on URL query param (e.g., ?topic=AI)
    window.onload = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const topic = urlParams.get('topic');
      if (topic) {
        filterArchive(topic);
      }
    };
  </script>
</body>
</html>
